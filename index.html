<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaScout | 流量模型驱动引擎</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #888888;
            --accent: #000000;
            --border: #eeeeee;
            --tag-a: #f4f4f4; /* 人性/禁区 */
            --tag-b: #f4f4f4; /* 消失/文献 */
            --tag-c: #f4f4f4; /* 异质/系统 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航 - 极简排版 */
        header {
            padding: 40px 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        header h1 { font-weight: 300; font-size: 24px; letter-spacing: 4px; }
        header .model-status { font-size: 12px; color: var(--text-sub); }

        /* 过滤器 */
        .filter-bar {
            padding: 20px 60px;
            display: flex;
            gap: 30px;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .filter-item { 
            cursor: pointer; 
            color: var(--text-sub); 
            transition: color 0.3s;
            position: relative;
        }
        .filter-item.active { color: var(--text-main); font-weight: 500; }
        .filter-item.active::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0; width: 100%; height: 1px; background: var(--text-main);
        }

        /* 灵感卡片流 */
        .scout-grid {
            padding: 20px 60px 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            border: 1px solid var(--border);
            padding: 30px;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 280px;
        }

        .card:hover { border-color: var(--text-main); }

        .card-tag {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            font-size: 11px;
        }

        .btn-hook {
            cursor: pointer;
            text-decoration: underline;
            color: var(--text-main);
        }

        /* 联网加载按钮 */
        .load-more {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: none;
        }

        /* 预览弹窗 */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            padding: 100px;
        }
    </style>
</head>
<body>

<header>
    <h1>IDEASCOUT</h1>
    <div class="model-status">TRAFFIC MODEL: v2.0 (A/B/C RECOGNITION)</div>
</header>

<div class="filter-bar" id="filterBar">
    <div class="filter-item active" data-type="ALL">全部无限流</div>
    <div class="filter-item" data-type="A">[A] 人性/心理/禁区</div>
    <div class="filter-item" data-type="B">[B] 消失/文献/考古</div>
    <div class="filter-item" data-type="C">[C] 异质/系统/逻辑</div>
</div>

<div class="scout-grid" id="cardGrid">
    </div>

<button class="load-more" onclick="fetchNewIdeas()">联网挖掘新灵感</button>

<script>
    // 1. 基于你 Top 20 数据的种子池
    const ideaSeed = [
        {
            type: 'A',
            title: '斯坦福监狱实验：未公开的录音',
            desc: '最新披露的档案显示，部分狱卒的残暴行为并非自发，而是受到了研究者的暗示。涉及心理控制与群体极化。',
            hook: '“如果你被赋予绝对的权力，你会在第几个小时变成恶魔？”'
        },
        {
            type: 'B',
            title: '伏尼契手稿：碳14定年的误差',
            desc: '新的物理分析表明，手稿的羊皮纸与墨水时间并不吻合，这可能暗示了某种跨时代的伪造或重写。',
            hook: '“这本没人能读懂的书，其材质本身就是一个跨越500年的谎言。”'
        },
        {
            type: 'C',
            title: '卡纳克神庙的“光影时钟”',
            desc: '古埃及人在特定时刻利用石柱阴影精确锁定位点，这种几何逻辑背后是一套完全脱离现代坐标系的思维方式。',
            hook: '“古埃及人从不用钟表，但他们把整座神庙变成了一台精准到秒的仪器。”'
        },
        {
            type: 'A',
            title: 'MK-Ultra：冷战时期的潜意识实验',
            desc: '解密文件显示，曾有平民在完全不知情的情况下被喂食幻觉药物，旨在测试人格擦除的可行性。',
            hook: '“你现在脑子里的这段记忆，真的是你自己的吗？”'
        },
        {
            type: 'B',
            title: '《红书》：荣格失踪的16年',
            desc: '心理学家荣格曾将自己与潜意识对话的内容记录在羊皮卷上，充满了未知的符号与图腾。',
            hook: '“最伟大的心理学家，曾花16年时间沉入自己精神的最底层。”'
        }
    ];

    let currentFilter = 'ALL';

    // 2. 渲染卡片逻辑
    function renderCards(data) {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        const filtered = data.filter(item => currentFilter === 'ALL' || item.type === currentFilter);
        
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <div class="card-tag">[ Category ${item.type} ]</div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-desc">${item.desc}</div>
                </div>
                <div class="card-footer">
                    <span class="btn-hook" onclick="alert('${item.hook}')">获取开篇钩子</span>
                    <span>FACT CHECKED</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 3. 模拟联网挖掘 (接入 Wikipedia API 的逻辑)
    async function fetchNewIdeas() {
        const btn = document.querySelector('.load-more');
        btn.innerText = "正在同步全球文献池...";
        
        try {
            // 这里利用 Wikipedia 随机 API 模拟联网过程
            const response = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary');
            const data = await response.json();
            
            // 自动化分类逻辑 (根据关键词简单分类)
            let type = 'C';
            if (data.extract.includes('psychology') || data.extract.includes('human')) type = 'A';
            if (data.extract.includes('ancient') || data.extract.includes('manuscript')) type = 'B';

            const newIdea = {
                type: type,
                title: data.title,
                desc: data.extract,
                hook: `从${data.title}的未知面切入，利用反直觉叙事。`
            };

            ideaSeed.unshift(newIdea); // 新灵感置顶
            renderCards(ideaSeed);
            btn.innerText = "联网挖掘新灵感";
        } catch (e) {
            alert("联网失败，请检查网络或 CORS 限制");
            btn.innerText = "联网挖掘新灵感";
        }
    }

    // 4. 初始化过滤器
    document.getElementById('filterBar').addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-item')) {
            document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.getAttribute('data-type');
            renderCards(ideaSeed);
        }
    });

    // 初始渲染
    renderCards(ideaSeed);

</script>

</body>
</html>
